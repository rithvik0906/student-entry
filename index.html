<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
</head>

<body style="margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;">

<div style="background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);">

<h2 style="text-align:center;margin-bottom:25px;color:#333;">
Student Registration
</h2>

<form id="studentForm">

<label style="font-weight:bold;color:#444;">Full Name</label>
<input id="name" type="text" placeholder="Enter your name" required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<label style="font-weight:bold;color:#444;">Email Address</label>
<input id="email" type="email" placeholder="Enter your email" required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<label style="font-weight:bold;color:#444;">Select Course</label>
<select id="course" required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<option value="">-- Choose a Course --</option>
<option>Computer Science</option>
<option>Data Science</option>
<option>Artificial Intelligence</option>
<option>Cyber Security</option>
<option>Web Development</option>

</select>

<button type="submit"
style="width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;">
Register
</button>

</form>

</div>

<script>

document.getElementById("studentForm").addEventListener("submit", async function(e){

e.preventDefault()

const name = document.getElementById("name").value
const email = document.getElementById("email").value
const course = document.getElementById("course").value

const data = {
name: name,
email: email,
course: course
}

try{

const response = await fetch("http://student-app-lb-605656912.us-east-1.elb.amazonaws.com/add",{
method:"POST",
headers:{
"Content-Type":"application/json"
},
body: JSON.stringify(data)
})

const result = await response.json()

alert("Student Registered Successfully")

}catch(error){

alert("Error submitting form")

}

})

</script>

</body>
</html>
