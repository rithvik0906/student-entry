<!DOCTYPE html>
<html>
<head>
<title>Student Registration</title>
</head>

<body style="margin:0;
font-family:Arial, Helvetica, sans-serif;
background:linear-gradient(135deg,#667eea,#764ba2);
height:100vh;
display:flex;
justify-content:center;
align-items:center;">

<div style="background:white;
padding:40px;
border-radius:10px;
width:350px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);">

<h2 style="text-align:center;margin-bottom:25px;color:#333;">
Student Registration
</h2>

<form>

<label style="font-weight:bold;color:#444;">Full Name</label>
<input type="text" placeholder="Enter your name" required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<label style="font-weight:bold;color:#444;">Email Address</label>
<input type="email" placeholder="Enter your email" required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:18px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<label style="font-weight:bold;color:#444;">Select Course</label>
<select required
style="width:100%;
padding:10px;
margin-top:6px;
margin-bottom:20px;
border:1px solid #ccc;
border-radius:6px;
font-size:14px;">

<option value="">-- Choose a Course --</option>
<option>Computer Science</option>
<option>Data Science</option>
<option>Artificial Intelligence</option>
<option>Cyber Security</option>
<option>Web Development</option>

</select>

<button type="submit"
style="width:100%;
padding:12px;
border:none;
border-radius:6px;
background:#667eea;
color:white;
font-size:16px;
cursor:pointer;">
Register
</button>

</form>

</div>

</body>
</html>
